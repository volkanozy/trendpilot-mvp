<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendPilot AI</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: auto;
}

.header {
    text-align: center;
    margin-bottom: 30px;
}

.header h1 {
    margin: 0;
    font-size: 32px;
}

.header p {
    opacity: 0.7;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

button {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
}

button:hover {
    background: #2563eb;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}

.result {
    background: #020617;
    padding: 15px;
    border-radius: 8px;
    margin-top: 15px;
    min-height: 80px;
}

.badge {
    display: inline-block;
    padding: 5px 10px;
    background: #22c55e;
    border-radius: 6px;
    margin-top: 10px;
    font-size: 12px;
}

</style>

</head>
<body>

<div class="container">

<div class="header">
<h1>TrendPilot AI</h1>
<p>Ürün fotoğrafı yükle, satış potansiyelini öğren</p>
<span class="badge">AI Destekli Analiz</span>
</div>

<div class="card">

<input type="file" id="imageUpload" accept="image/*">

<button onclick="analyzeImage()">
Satış Potansiyelini Analiz Et
</button>

<div id="analysisResult" class="result">
Analiz sonucu burada görünecek...
</div>

</div>

</div>

<script>

function analyzeImage() {

const fileInput = document.getElementById("imageUpload");

if (!fileInput.files[0]) {

alert("Lütfen ürün fotoğrafı seç");

return;

}

document.getElementById("analysisResult").innerHTML =
"AI analiz ediyor...";

setTimeout(() => {

const trendScore = Math.floor(Math.random() * 30) + 70;

const profit = Math.floor(Math.random() * 40) + 30;

let competition;

if (trendScore > 85)
competition = "Düşük";

else if (trendScore > 75)
competition = "Orta";

else
competition = "Yüksek";


let recommendation;

if (trendScore > 85)

recommendation =
"Yüksek satış potansiyeli. Bu ürün e-ticaret için güçlü aday.";

else if (trendScore > 75)

recommendation =
"İyi potansiyel. Doğru pazarlama ile başarılı olabilir.";

else

recommendation =
"Ortalama potansiyel. Niş hedefleme önerilir.";


document.getElementById("analysisResult").innerHTML = `

Trend Skoru: ${trendScore}/100<br><br>

Tahmini Kar Marjı: %${profit}<br><br>

Rekabet Seviyesi: ${competition}<br><br>

Stratejik Öneri:<br>

${recommendation}

`;

}, 1500);

}

</script>

</body>
</html>
