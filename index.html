<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vibe Coding Analyzer Pro</title>

<style>

body{
font-family:Arial;
max-width:800px;
margin:auto;
padding:20px;
background:#f4f6f8;
}

textarea{
width:100%;
height:150px;
margin-bottom:10px;
font-size:16px;
padding:10px;
}

button{
padding:12px 20px;
font-size:16px;
cursor:pointer;
background:#0a66c2;
color:white;
border:none;
border-radius:6px;
}

button:hover{
background:#004182;
}

#result{
margin-top:20px;
padding:15px;
background:white;
border-radius:6px;
white-space:pre-wrap;
}

#history{
margin-top:20px;
background:white;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<h2>Vibe Coding Analyzer Pro</h2>

<textarea id="idea" placeholder="Startup fikrini yaz..."></textarea>

<button onclick="analyze()">Analiz Et</button>

<div id="result"></div>

<div id="history">
<h3>Geçmiş Analizler</h3>
<div id="historyList"></div>
</div>

<script>

loadHistory()

async function analyze(){

const idea = document.getElementById("idea").value

if(!idea){
alert("Fikir gir")
return
}

document.getElementById("result").innerHTML="Analiz yapılıyor..."

try{

const response = await fetch("/api/analyze", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
idea:idea
})

})

const data = await response.json()

document.getElementById("result").innerHTML=data.result

saveHistory(idea,data.result)

loadHistory()

}catch(e){

document.getElementById("result").innerHTML="Hata oluştu"

}

}



function saveHistory(idea,result){

let history = JSON.parse(localStorage.getItem("history")||"[]")

history.unshift({

idea:idea,

result:result,

date:new Date().toLocaleString()

})

localStorage.setItem("history",JSON.stringify(history))

}



function loadHistory(){

let history = JSON.parse(localStorage.getItem("history")||"[]")

let html=""

history.slice(0,5).forEach(item=>{

html+=`
<div style="margin-bottom:10px;">
<b>${item.date}</b><br>
${item.idea}
</div>
<hr>
`

})

document.getElementById("historyList").innerHTML=html

}

</script>

</body>
</html>
