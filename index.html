<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendPilot AI</title>

<style>

body {
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #0f172a, #020617);
color: white;
margin: 0;
padding: 20px;
}

.container {
max-width: 600px;
margin: auto;
}

.header {
text-align: center;
margin-bottom: 30px;
}

.card {
background: #1e293b;
padding: 20px;
border-radius: 12px;
}

button {
background: #3b82f6;
color: white;
border: none;
padding: 14px;
border-radius: 8px;
cursor: pointer;
width: 100%;
font-size: 16px;
margin-top: 10px;
}

button:hover {
background: #2563eb;
}

input {
width: 100%;
padding: 10px;
}

.result {
background: #020617;
padding: 15px;
border-radius: 8px;
margin-top: 15px;
min-height: 100px;
}

.badge {
background: #22c55e;
padding: 5px 10px;
border-radius: 6px;
font-size: 12px;
}

.limit {
font-size: 12px;
opacity: 0.7;
margin-top: 10px;
}

</style>

</head>
<body>

<div class="container">

<div class="header">
<h1>TrendPilot AI</h1>
<p>Ürün fotoğrafı yükle, satış potansiyelini öğren</p>
<span class="badge">AI Destekli</span>
<div id="limitInfo" class="limit"></div>
</div>

<div class="card">

<input type="file" id="imageUpload" accept="image/*">

<button onclick="analyzeImage()">
Analiz Et
</button>

<div id="analysisResult" class="result">
Analiz sonucu burada görünecek
</div>

</div>

</div>

<script>

const DAILY_LIMIT = 3;

function getUsage() {

const today = new Date().toDateString();

let data = JSON.parse(localStorage.getItem("trendpilot_usage"));

if (!data || data.date !== today) {

data = {
date: today,
count: 0
};

}

return data;

}

function saveUsage(data) {

localStorage.setItem("trendpilot_usage", JSON.stringify(data));

}

function updateLimitInfo() {

let usage = getUsage();

document.getElementById("limitInfo").innerHTML =
"Günlük ücretsiz analiz hakkı: " +
(DAILY_LIMIT - usage.count);

}

function analyzeImage() {

const fileInput = document.getElementById("imageUpload");

if (!fileInput.files[0]) {

alert("Fotoğraf seç");

return;

}

let usage = getUsage();

if (usage.count >= DAILY_LIMIT) {

document.getElementById("analysisResult").innerHTML =

"<b>Limit doldu.</b><br><br>Premium ile sınırsız analiz açılacak.";

return;

}

usage.count++;

saveUsage(usage);

updateLimitInfo();

document.getElementById("analysisResult").innerHTML =
"AI analiz ediyor...";

setTimeout(() => {

const trend = Math.floor(Math.random() * 30) + 70;

const profit = Math.floor(Math.random() * 40) + 30;

let competition;

if (trend > 85)
competition = "Düşük";
else if (trend > 75)
competition = "Orta";
else
competition = "Yüksek";

document.getElementById("analysisResult").innerHTML =

"<b>Trend Skoru:</b> " + trend + "/100<br><br>" +
"<b>Kar Marjı:</b> %" + profit + "<br><br>" +
"<b>Rekabet:</b> " + competition;

}, 1200);

}

updateLimitInfo();

</script>

</body>
</html>
